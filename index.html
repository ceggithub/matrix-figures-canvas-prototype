<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Figure Overlay Prototype</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="hud">
    <h1>Matrix Figure Overlay</h1>
    <p>Abstract morph scenes with pseudo-glyph grid and relief glow.</p>
    <p id="scene-label">Scene: Golden Spiral</p>
    <div class="controls">
      <label class="control">
        <span>Speed</span>
        <input id="speed-control" type="range" min="0.4" max="1.8" value="1" step="0.05">
      </label>
      <label class="control">
        <span>Brightness</span>
        <input id="brightness-control" type="range" min="0.6" max="1.6" value="1" step="0.05">
      </label>
      <label class="control">
        <span>Density</span>
        <input id="density-control" type="range" min="0.45" max="1" value="0.74" step="0.01">
      </label>
      <div class="button-row">
        <button id="pause-btn" type="button">Pause</button>
        <button id="lock-btn" type="button">Lock Scene</button>
      </div>
      <div class="button-row">
        <button id="preset-performance-btn" type="button">Performance</button>
        <button id="preset-quality-btn" type="button">Quality</button>
      </div>
    </div>
  </div>
  <canvas id="matrix-canvas" aria-label="Matrix figure animation"></canvas>
  <script src="./main.js"></script>
</body>
</html>
